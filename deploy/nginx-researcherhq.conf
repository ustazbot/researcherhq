# Cloudflare real IP restoration
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

# 36B — rate limit for public (no-auth) survey submission at the edge.
# App-level limiter (rate_limiter.py) is the second layer; this protects the
# VPS before the request reaches uvicorn. No Cloudflare rate-limit dependency.
limit_req_zone $binary_remote_addr zone=public_survey:10m rate=10r/m;
limit_req_status 429;

server {
    server_name researcherhq.com www.researcherhq.com;

    # Landing page
    location = / {
        root /var/www/researcherhq/landing-stub;
        try_files /index.html =404;
    }

    # Favicons
    location = /og-image.png {
        root /var/www/researcherhq/landing-stub;
    }

    location ~ ^/favicon\.(svg|ico|png)$ {
        root /var/www/researcherhq/landing-stub;
    }

    # Bare /app (no trailing slash) matches no location below and 404s —
    # react-router basename="/app" navigate('/') produces exactly this URL.
    # Redirect to /app/ so the SPA location block below picks it up.
    location = /app {
        return 301 /app/;
    }

    # SPA assets (JS/CSS/images) — served directly
    location /app/assets/ {
        root /var/www/researcherhq;
        expires 1y;
        add_header Cache-Control public;
    }

    # SPA static files (favicon, icons)
    location ~ ^/app/(favicon\.svg|icons\.svg)$ {
        root /var/www/researcherhq;
    }

    # SPA — semua route di bawah /app/ serve index.html
    location /app/ {
        root /var/www/researcherhq;
        try_files $uri $uri/ /app/index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Public survey API — rate-limited (more specific prefix wins over /api/).
    # Public respondents hit /api/public/... ; burst absorbs form re-submits.
    location /api/public/ {
        limit_req zone=public_survey burst=5 nodelay;
        client_max_body_size 1m;
        proxy_pass http://127.0.0.1:8000/public/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy
    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/researcherhq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/researcherhq.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.researcherhq.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = researcherhq.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name researcherhq.com www.researcherhq.com;
    return 404;
}
